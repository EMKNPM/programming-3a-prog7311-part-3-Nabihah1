# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x   

    - name: Restore dependencies
      run: dotnet restore PROG7311TechMoveLogistics.slnx

    - name: Build solution
      run: dotnet build PROG7311TechMoveLogistics.slnx --no-restore

    - name: Run tests
      run: dotnet test PROG7311TechMoveLogistics.slnx --no-build --verbosity normal
