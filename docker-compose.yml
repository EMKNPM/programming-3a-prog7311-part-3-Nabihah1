services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Pass123"
    ports:
      - "1433:1433"

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMoveLogisticsAPI/Dockerfile
    container_name: glms-backend-api
    ports:
      - "7001:8080"
    depends_on:
      - sql-server-db
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server-db;Database=TechMoveLogisticsDB3;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;"

  glms-frontend-web:
    build:
      context: .
      dockerfile: PROG7311TechMoveLogistics/Dockerfile
    container_name: glms-frontend-web
    ports:
      - "5000:8080"
    depends_on:
      - glms-backend-api
    environment:
      ApiSettings__BaseUrl: "http://glms-backend-api:8080/"
      ASPNETCORE_ENVIRONMENT: "Development"